name: 🎬 Bluesky Movie Poster

on:
  schedule:
    # USA Eastern Time (EST = UTC-5 / EDT = UTC-4)
    # 5 posts per day — each run posts to all accounts simultaneously
    - cron: '0 13 * * *'   # 08:00 AM EST  ☀️ Morning
    - cron: '0 17 * * *'   # 12:00 PM EST  🍔 Lunch
    - cron: '0 22 * * *'   # 05:00 PM EST  🌆 Evening
    - cron: '0 1  * * *'   # 08:00 PM EST  🌙 Night
    - cron: '0 3  * * *'   # 10:00 PM EST  🌃 Late Night

  workflow_dispatch:
    inputs:
      run_reason:
        description: 'Manual run reason'
        required: false
        default: 'Test run'

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    # ✅ Bug 6 Fix: 15 → 5 মিনিট (fixes-এর পর 1-2 মিনিটেই শেষ হয়)
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # ✅ Bug 5 Fix: pip cache — প্রতি run-এ নতুন install বাদ (~45s বাঁচবে)
          cache: 'pip'

      - name: 📦 Install dependencies
        # ✅ Bug 4 Fix: pillow বাদ — post.py-তে PIL কোথাও ব্যবহার হয় না
        run: pip install -r requirements.txt

      - name: 🚀 Run Movie Poster Bot
        env:
          # NVIDIA NIM API
          NVIDIA_API_KEY:    ${{ secrets.NVIDIA_API_KEY }}

          # TMDB API Key
          TMDB_API_KEY:      ${{ secrets.TMDB_API_KEY }}

          # Bluesky Accounts
          BSKY_HANDLE_1:     ${{ secrets.BSKY_HANDLE_1 }}
          BSKY_PASSWORD_1:   ${{ secrets.BSKY_PASSWORD_1 }}

          BSKY_HANDLE_2:     ${{ secrets.BSKY_HANDLE_2 }}
          BSKY_PASSWORD_2:   ${{ secrets.BSKY_PASSWORD_2 }}

          BSKY_HANDLE_3:     ${{ secrets.BSKY_HANDLE_3 }}
          BSKY_PASSWORD_3:   ${{ secrets.BSKY_PASSWORD_3 }}

          BSKY_HANDLE_4:     ${{ secrets.BSKY_HANDLE_4 }}
          BSKY_PASSWORD_4:   ${{ secrets.BSKY_PASSWORD_4 }}

          BSKY_HANDLE_5:     ${{ secrets.BSKY_HANDLE_5 }}
          BSKY_PASSWORD_5:   ${{ secrets.BSKY_PASSWORD_5 }}

        run: python post.py

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🎬 Bluesky Movie Poster Bot" >> $GITHUB_STEP_SUMMARY
          echo "- **UTC Time:** $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **USA EST:** $(TZ='America/New_York' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
