name: 🤖 Bluesky Multi-Account Poster

on:
  schedule:
    # USA Eastern Time (EST = UTC-5 / EDT = UTC-4)
    # প্রতিদিন ৫ বার — প্রতিবারে ৫ account-এ একসাথে পোস্ট
    - cron: '0 13 * * *'   # USA EST 08:00 AM  ☀️ Morning
    - cron: '0 17 * * *'   # USA EST 12:00 PM  🍔 Lunch
    - cron: '0 22 * * *'   # USA EST 05:00 PM  🌆 Evening
    - cron: '0 1  * * *'   # USA EST 08:00 PM  🌙 Night
    - cron: '0 3  * * *'   # USA EST 10:00 PM  🌃 Late Night

  # হাতে চালাতে চাইলে
  workflow_dispatch:
    inputs:
      run_reason:
        description: 'Manual run কারণ'
        required: false
        default: 'Test run'

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install requests pillow

      - name: 🚀 Run Multi-Account Poster
        env:
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}

          BSKY_HANDLE_1:     ${{ secrets.BSKY_HANDLE_1 }}
          BSKY_PASSWORD_1:   ${{ secrets.BSKY_PASSWORD_1 }}

          BSKY_HANDLE_2:     ${{ secrets.BSKY_HANDLE_2 }}
          BSKY_PASSWORD_2:   ${{ secrets.BSKY_PASSWORD_2 }}

          BSKY_HANDLE_3:     ${{ secrets.BSKY_HANDLE_3 }}
          BSKY_PASSWORD_3:   ${{ secrets.BSKY_PASSWORD_3 }}

          BSKY_HANDLE_4:     ${{ secrets.BSKY_HANDLE_4 }}
          BSKY_PASSWORD_4:   ${{ secrets.BSKY_PASSWORD_4 }}

          BSKY_HANDLE_5:     ${{ secrets.BSKY_HANDLE_5 }}
          BSKY_PASSWORD_5:   ${{ secrets.BSKY_PASSWORD_5 }}

        run: python post.py

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 📱 Bluesky Multi-Account Poster" >> $GITHUB_STEP_SUMMARY
          echo "- **UTC Time:** $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **USA EST:** $(TZ='America/New_York' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
