name: 🤖 Bluesky Agency Recruiter

on:
  schedule:
    - cron: '30 2 * * *'   # সকাল ৮টা IST (Kolkata)
    - cron: '30 7 * * *'   # দুপুর ১টা IST (Kolkata)
    - cron: '30 15 * * *'  # রাত ৯টা IST (Kolkata)

  workflow_dispatch:
    inputs:
      post_count:
        description: 'কতটি পোস্ট? (1-3)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3']

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🚀 Run Poster
        env:
          BSKY_HANDLE:        ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD:  ${{ secrets.BSKY_APP_PASSWORD }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          POST_COUNT:         ${{ github.event.inputs.post_count || '1' }}
          POST_DELAY_SECONDS: '30'
        run: python post.py

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 📱 Bluesky Agency Poster" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (UTC):** $(date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
